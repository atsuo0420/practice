<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>モーニングブリーフ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>☀️ モーニングブリーフ</h1>
      <p class="subtitle">通勤時間でサッと読める、あなた専用のニュースまとめ</p>
    </header>

    <section id="api-key-section" class="api-key-section">
      <label for="api-key-input">NewsAPI キー</label>
      <p class="hint">
        <a href="https://newsapi.org/register" target="_blank" rel="noopener">newsapi.org</a>
        で無料登録して取得したAPIキーを入力してください（ブラウザ内にのみ保存されます）
      </p>
      <div class="api-key-row">
        <input type="text" id="api-key-input" placeholder="APIキーを貼り付け">
        <button id="save-key-btn">保存</button>
      </div>
    </section>

    <div class="toolbar">
      <button id="refresh-btn">🔄 更新する</button>
      <button id="change-key-btn" class="link-btn">APIキーを変更</button>
    </div>

    <main id="feed"></main>
  </div>

  <script src="script.js"></script>
</body>
</html>
